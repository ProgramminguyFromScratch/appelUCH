<!DOCTYPE html>
<html>
<head>
    <title>Appel</title>
    <style>
        body { 
            margin: 0; 
            background: #111; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: Arial, sans-serif;
        }
        canvas { 
            background: #000; 
            border: 2px solid #444; 
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            background: rgba(0,0,0,0.85);
            color: #fff;
            z-index: 10;
        }
        .overlay h1 {
            font-weight: normal;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .overlay button {
            font-size: 18px;
            padding: 12px 32px;
            background: #0077ff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }
        .overlay button:hover {
            background: #0090ff;
        }
        .overlay button:disabled {
            background: #333;
            cursor: not-allowed;
        }
        .overlay button.secondary {
            background: #2a2f3a;
            font-size: 14px;
            padding: 8px 18px;
        }
        .overlay button.secondary:hover {
            background: #3a4150;
        }
        .overlay button.secondary.copied {
            background: #22c55e;
        }
        .overlay input {
            font-size: 16px;
            padding: 10px 14px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .overlay input::placeholder { color: #777; }

        .rowGroup { display: flex; gap: 10px; align-items: center; }

        #errorText {
            color: #ff5470;
            font-size: 14px;
            min-height: 18px;
        }

        #roomCodeLabel {
            font-size: 15px;
            color: #8891a3;
        }
        #roomCodeValue {
            font-size: 28px;
            letter-spacing: 4px;
            font-weight: bold;
            color: #3aa0ff;
        }

        #playerList {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        #playerList li {
            display: flex;
            justify-content: space-between;
            padding: 8px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 6px;
            font-size: 15px;
        }
        #playerList li .hostTag {
            color: #fbbf24;
            font-size: 12px;
            margin-left: 6px;
        }
        #playerList li .disconnectedTag {
            color: #ff5470;
            font-size: 12px;
        }
        #playerList li .colorDot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            border: 1px solid rgba(255,255,255,0.4);
            vertical-align: middle;
        }
        #playerList li .nameLabel {
            display: flex;
            align-items: center;
        }

        #colorPicker {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        #colorPreviewCanvas {
            width: 72px;
            height: 72px;
            image-rendering: pixelated;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 8px;
        }
        #colorSliderWrap {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        #colorSlider {
            width: 200px;
        }
        #colorSliderLabel {
            font-size: 12px;
            color: #8891a3;
            text-align: center;
        }

        #waitingForHost {
            color: #8891a3;
            font-size: 14px;
        }

        #settingsPanel {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 8px;
            padding: 14px 16px;
        }
        #settingsPanel h2 {
            font-size: 14px;
            font-weight: normal;
            letter-spacing: 1px;
            color: #8891a3;
            margin: 0 0 4px 0;
            text-transform: uppercase;
        }
        .settingRow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        .settingRow label {
            color: #f4f6fb;
        }
        .settingRow input {
            width: 70px;
            padding: 6px 8px;
            font-size: 14px;
            text-align: center;
        }
        .settingRow input:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }
        #settingsSavedTag {
            font-size: 12px;
            color: #4ade80;
            text-align: center;
            min-height: 14px;
        }

        #canvasWrap {
            position: relative;
            display: inline-block;
            line-height: 0;
        }

        #copyLevelCodeBtn {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 20;
            font-size: 15px;
            padding: 10px 22px;
            background: #0077ff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: Arial, sans-serif;
            display: none;
        }
        #copyLevelCodeBtn:hover {
            background: #0090ff;
        }
        #copyLevelCodeBtn.copied {
            background: #22c55e;
        }
    </style>
</head>
<body>
    <div id="canvasWrap">
        <canvas id="gameCanvas"></canvas>
        <button id="copyLevelCodeBtn">Copy Level Code</button>
    </div>

    <div id="nameScreen" class="overlay">
        <h1>APPEL</h1>
        <input id="displayNameInput" type="text" placeholder="Your name" maxlength="24" />
        <div class="rowGroup">
            <input id="roomCodeInput" type="text" placeholder="Room code (optional)" maxlength="5" style="text-transform:uppercase; width: 160px;" />
        </div>
        <div class="rowGroup">
            <button id="btnCreateOrJoin">Create / Join Room</button>
        </div>
        <div id="errorText"></div>
    </div>

    <div id="lobbyScreen" class="overlay" style="display:none;">
        <h1>Lobby</h1>
        <div id="roomCodeLabel">Room code</div>
        <div id="roomCodeValue">-----</div>
        <button id="btnCopyInvite" class="secondary">Copy Invite Link</button>
        <div id="colorPicker">
            <canvas id="colorPreviewCanvas" width="24" height="24"></canvas>
            <div id="colorSliderWrap">
                <input id="colorSlider" type="range" min="0" max="199" value="0" />
                <div id="colorSliderLabel">Your color</div>
            </div>
        </div>
        <ul id="playerList"></ul>

        <div id="settingsPanel">
            <h2>Match Settings</h2>
            <div class="settingRow">
                <label for="settingLives">Lives per attempt</label>
                <input id="settingLives" type="number" min="1" max="5" step="1" />
            </div>
            <div class="settingRow">
                <label for="settingPointsToWin">Points to win</label>
                <input id="settingPointsToWin" type="number" min="3" max="99" step="1" />
            </div>
            <div class="settingRow">
                <label for="settingComebackPoints">Comeback points</label>
                <input id="settingComebackPoints" type="number" min="0" max="10" step="1" />
            </div>
            <div class="settingRow">
                <label for="settingFirstPlacePoints">First place points</label>
                <input id="settingFirstPlacePoints" type="number" min="0" max="10" step="1" />
            </div>
            <div class="settingRow">
                <label for="settingTotalRounds">Rounds</label>
                <input id="settingTotalRounds" type="number" min="1" max="30" step="1" />
            </div>
            <div class="settingRow">
                <label for="settingRaceTimeLimit">Race time limit (s)</label>
                <input id="settingRaceTimeLimit" type="number" min="15" max="180" step="5" />
            </div>
            <div id="settingsSavedTag"></div>
        </div>

        <button id="btnStartMatch" style="display:none;">Start</button>
        <div id="waitingForHost" style="display:none;">Waiting for the host to start...</div>
    </div>

    <script src="touching.js"></script>
    <script src="sfx.js"></script>
    <script src="physics.js"></script>
    <script src="levelRenderer.js"></script>
    <script src="pieces.js"></script>
    <script src="levelCode.js"></script>
    <script src="network.js"></script>
    <script src="game.js"></script>

    <script>
        (function restoreGithubPagesRedirect() {
            const saved = sessionStorage.getItem('appel_redirect_path');
            if (saved) {
                sessionStorage.removeItem('appel_redirect_path');
                if (saved !== window.location.pathname + window.location.search) {
                    window.history.replaceState({}, '', saved);
                }
            }
        })();

        const params = new URLSearchParams(window.location.search);
        const replayCode = null;

        const playersParam = parseInt(params.get("players"), 10);
        const playerCount = Number.isFinite(playersParam) ? playersParam : 2;

        const nameScreen = document.getElementById('nameScreen');
        const lobbyScreen = document.getElementById('lobbyScreen');
        const displayNameInput = document.getElementById('displayNameInput');
        const roomCodeInput = document.getElementById('roomCodeInput');
        const btnCreateOrJoin = document.getElementById('btnCreateOrJoin');
        const errorText = document.getElementById('errorText');
        const roomCodeValue = document.getElementById('roomCodeValue');
        const btnCopyInvite = document.getElementById('btnCopyInvite');
        const playerList = document.getElementById('playerList');
        const btnStartMatch = document.getElementById('btnStartMatch');
        const waitingForHost = document.getElementById('waitingForHost');

        const copyLevelCodeBtn = document.getElementById('copyLevelCodeBtn');
        function wireCopyLevelCodeButton(game) {
            game.onFinalResults = (levelCode) => {
                copyLevelCodeBtn.style.display = levelCode ? 'block' : 'none';
                copyLevelCodeBtn.classList.remove('copied');
                copyLevelCodeBtn.textContent = 'Copy Level Code';
                copyLevelCodeBtn.dataset.levelCode = levelCode || '';
            };
            game.onFinalResultsHidden = () => {
                copyLevelCodeBtn.style.display = 'none';
            };
        }
        copyLevelCodeBtn.addEventListener('click', async () => {
            const levelCode = copyLevelCodeBtn.dataset.levelCode;
            if (!levelCode) return;
            try {
                await navigator.clipboard.writeText(levelCode);
            } catch (err) {
                const ta = document.createElement('textarea');
                ta.value = levelCode;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); } catch (e2) {}
                document.body.removeChild(ta);
            }
            copyLevelCodeBtn.classList.add('copied');
            copyLevelCodeBtn.textContent = 'Copied!';
            setTimeout(() => {
                copyLevelCodeBtn.classList.remove('copied');
                copyLevelCodeBtn.textContent = 'Copy Level Code';
            }, 1500);
        });

        // const serverUrl = params.get('server') || `ws://${window.location.hostname || 'localhost'}:8080`;
        const serverUrl = params.get('server') || `https://appeluch.onrender.com/`;
        const network = new NetworkClient(serverUrl);
        const game = new Game('gameCanvas', playerCount, network);
        wireCopyLevelCodeButton(game);

        {

            async function copyTextToClipboard(text) {
                try {
                    await navigator.clipboard.writeText(text);
                } catch (err) {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.position = 'fixed';
                    ta.style.opacity = '0';
                    document.body.appendChild(ta);
                    ta.select();
                    try { document.execCommand('copy'); } catch (e2) {}
                    document.body.removeChild(ta);
                }
            }

            btnCopyInvite.addEventListener('click', async () => {
                const roomCode = roomCodeValue.textContent.trim();
                if (!roomCode || roomCode === '-----') return;
                const inviteUrl = `${window.location.origin}/${roomCode}`;
                await copyTextToClipboard(inviteUrl);
                btnCopyInvite.classList.add('copied');
                btnCopyInvite.textContent = 'Copied!';
                setTimeout(() => {
                    btnCopyInvite.classList.remove('copied');
                    btnCopyInvite.textContent = 'Copy Invite Link';
                }, 1500);
            });

            const STORAGE_KEY = 'appel_player_id';

            function getRoomCodeFromPath() {
                const segment = window.location.pathname.replace(/^\/+|\/+$/g, '');
                if (!segment) return '';

                if (!/^[A-Za-z0-9]{1,5}$/.test(segment)) return '';
                return segment.toUpperCase();
            }

            const codeFromUrl = getRoomCodeFromPath();
            if (codeFromUrl) {
                roomCodeInput.value = codeFromUrl;
                displayNameInput.focus();
            }

            function updateUrlForRoom(roomCode) {
                if (!roomCode) return;
                const newPath = `/${roomCode}`;
                if (window.location.pathname !== newPath) {
                    window.history.replaceState({}, '', newPath + window.location.search);
                }
            }

            function showError(message) {
                errorText.textContent = message || '';
            }

            function sanitizeDisplayName(raw) {
                return String(raw || '').replace(/[^\x20-\x7E]/g, '').trim();
            }

            btnCreateOrJoin.addEventListener('click', () => {
                const name = sanitizeDisplayName(displayNameInput.value);
                if (!name) {
                    showError('Enter a name using standard keyboard characters.');
                    return;
                }
                displayNameInput.value = name;
                showError('');
                btnCreateOrJoin.disabled = true;

                const attemptJoin = () => {
                    const roomCode = roomCodeInput.value.trim().toUpperCase();
                    const savedPlayerId = sessionStorage.getItem(STORAGE_KEY);
                    network.joinRoom(roomCode, name, savedPlayerId);
                };

                if (network.isConnected) {
                    attemptJoin();
                } else {
                    const priorOnOpen = network.onOpen;
                    network.onOpen = () => {
                        if (priorOnOpen) priorOnOpen();
                        attemptJoin();
                    };
                    network.connect();
                }
            });

            const priorOnSeatAssigned = network.onSeatAssigned;
            network.onSeatAssigned = (payload) => {
                if (priorOnSeatAssigned) priorOnSeatAssigned(payload);
                sessionStorage.setItem(STORAGE_KEY, payload.playerId);
                nameScreen.style.display = 'none';
                lobbyScreen.style.display = 'flex';
            };

            network.onJoinRejected = (payload) => {
                btnCreateOrJoin.disabled = false;
                window.history.replaceState({}, '', '/' + window.location.search);
                showError(
                    payload.reason === 'room_full' ? 'That room is full.' :
                    payload.reason === 'match_in_progress' ? 'That room already started a match.' :
                    payload.reason === 'name_taken' ? 'That name is already taken in this room.' :
                    payload.reason === 'invalid_name' ? 'Enter a name using standard keyboard characters.' :
                    'Could not join that room.'
                );
            };

            const colorSlider = document.getElementById('colorSlider');
            const colorPreviewCanvas = document.getElementById('colorPreviewCanvas');
            const previewCtx = colorPreviewCanvas.getContext('2d');
            previewCtx.imageSmoothingEnabled = false;

            const SETTINGS_FIELDS = {
                lives: document.getElementById('settingLives'),
                pointsToWin: document.getElementById('settingPointsToWin'),
                comebackPoints: document.getElementById('settingComebackPoints'),
                firstPlacePoints: document.getElementById('settingFirstPlacePoints'),
                totalRounds: document.getElementById('settingTotalRounds'),
                raceTimeLimit: document.getElementById('settingRaceTimeLimit')
            };
            const settingsSavedTag = document.getElementById('settingsSavedTag');
            let settingsSavedTagTimeout = null;

            function applySettingsToInputs(settings, isHost) {
                if (!settings) return;
                for (const key of Object.keys(SETTINGS_FIELDS)) {
                    const input = SETTINGS_FIELDS[key];
                    if (document.activeElement === input) continue; 
                    if (typeof settings[key] === 'number') input.value = settings[key];
                    input.disabled = !isHost;
                }
            }

            function wireSettingInput(key, input) {
                input.addEventListener('change', () => {
                    if (!game.isHost && !game.isAdmin) return;
                    const value = parseInt(input.value, 10);
                    if (!Number.isFinite(value)) return;
                    game.requestUpdateSettings({ [key]: value });
                });
            }
            for (const key of Object.keys(SETTINGS_FIELDS)) {
                wireSettingInput(key, SETTINGS_FIELDS[key]);
            }

            game.onAdminChanged = (isAdmin) => {
                applySettingsToInputs(game.settings, game.isHost || isAdmin);
            };

            game.onSettingsUpdated = (settings, isHost) => {
                applySettingsToInputs(settings, isHost);
                settingsSavedTag.textContent = 'Settings updated';
                clearTimeout(settingsSavedTagTimeout);
                settingsSavedTagTimeout = setTimeout(() => { settingsSavedTag.textContent = ''; }, 1500);
            };

            function rgbToHsv(r, g, b) {
                r /= 255; g /= 255; b /= 255;
                const max = Math.max(r, g, b), min = Math.min(r, g, b), d = max - min;
                let h = 0;
                if (d !== 0) {
                    if (max === r) h = ((g - b) / d) % 6;
                    else if (max === g) h = (b - r) / d + 2;
                    else h = (r - g) / d + 4;
                }
                h = ((h * 60) + 360) % 360;
                const s = max === 0 ? 0 : d / max;
                return [h, s, max];
            }
            function hsvToRgb(h, s, v) {
                h /= 60;
                const c = v * s;
                const x = c * (1 - Math.abs(h % 2 - 1));
                const m = v - c;
                const [r, g, b] =
                    h < 1 ? [c, x, 0] : h < 2 ? [x, c, 0] : h < 3 ? [0, c, x] :
                    h < 4 ? [0, x, c] : h < 5 ? [x, 0, c] : [c, 0, x];
                return [(r + m) * 255, (g + m) * 255, (b + m) * 255];
            }
            function applyHueShift(sourceImg, hueShift) {
                const canvas = document.createElement('canvas');
                canvas.width = sourceImg.naturalWidth || sourceImg.width;
                canvas.height = sourceImg.naturalHeight || sourceImg.height;
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(sourceImg, 0, 0);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i + 3] === 0) continue;
                    const [h, s, v] = rgbToHsv(data[i], data[i + 1], data[i + 2]);
                    const hNorm = (h / 360 + (hueShift % 200) / 200) % 1.0;
                    const [r, g, b] = hsvToRgb(hNorm * 360, s, v);
                    data[i] = r; data[i + 1] = g; data[i + 2] = b;
                }
                ctx.putImageData(imageData, 0, 0);
                return canvas;
            }

            let playerPreviewSprite = null;
            const playerPreviewImg = new Image();
            playerPreviewImg.onload = () => {
                playerPreviewSprite = playerPreviewImg;
                drawColorPreview(parseInt(colorSlider.value, 10));
            };
            playerPreviewImg.src = 'assets/player/stand.png';

            function drawColorPreview(hue) {
                previewCtx.clearRect(0, 0, colorPreviewCanvas.width, colorPreviewCanvas.height);
                if (!playerPreviewSprite) return;
                const tinted = applyHueShift(playerPreviewSprite, hue);
                previewCtx.drawImage(tinted, 0, 0, colorPreviewCanvas.width, colorPreviewCanvas.height);
            }

            let draggingColorSlider = false;
            let lastSentHue = null;
            function sendHueUpdate(hue) {
                if (hue === lastSentHue) return;
                lastSentHue = hue;
                game.requestSetColor(hue);
            }
            colorSlider.addEventListener('input', () => {
                draggingColorSlider = true;
                const hue = parseInt(colorSlider.value, 10);
                drawColorPreview(hue);
                sendHueUpdate(hue);
            });
            colorSlider.addEventListener('change', () => {
                draggingColorSlider = false;
                sendHueUpdate(parseInt(colorSlider.value, 10));
            });

            game.onLobbyUpdate = (payload, isHost) => {
                roomCodeValue.textContent = payload.roomCode;
                updateUrlForRoom(payload.roomCode);
                applySettingsToInputs(payload.settings || game.settings, isHost);

                const mySeat = payload.seats.find(s => s.seatIndex === game.localSeatIndex);
                if (mySeat && typeof mySeat.hue === 'number' && !draggingColorSlider) {
                    colorSlider.value = mySeat.hue;
                    lastSentHue = mySeat.hue;
                    drawColorPreview(mySeat.hue);
                }

                playerList.innerHTML = '';
                for (const seat of payload.seats) {
                    const li = document.createElement('li');
                    const label = document.createElement('span');
                    label.className = 'nameLabel';
                    if (typeof seat.hue === 'number') {
                        const dot = document.createElement('span');
                        dot.className = 'colorDot';
                        dot.style.background = hueShiftToHex(seat.hue);
                        label.appendChild(dot);
                    }
                    const nameText = document.createElement('span');
                    nameText.textContent = seat.name;
                    label.appendChild(nameText);
                    if (seat.seatIndex === payload.hostSeatIndex) {
                        const hostTag = document.createElement('span');
                        hostTag.className = 'hostTag';
                        hostTag.textContent = 'HOST';
                        label.appendChild(hostTag);
                    }
                    li.appendChild(label);
                    if (!seat.connected) {
                        const disc = document.createElement('span');
                        disc.className = 'disconnectedTag';
                        disc.textContent = 'disconnected';
                        li.appendChild(disc);
                    }
                    playerList.appendChild(li);
                }

                btnStartMatch.style.display = isHost ? 'inline-block' : 'none';
                waitingForHost.style.display = isHost ? 'none' : 'block';
            };

            btnStartMatch.addEventListener('click', () => {
                game.requestStartMatch();
            });

            function returnToNameScreen(message) {
                lobbyScreen.style.display = 'none';
                nameScreen.style.display = 'flex';
                btnCreateOrJoin.disabled = false;
                showError(message || '');
                window.history.replaceState({}, '', '/' + window.location.search);
            }

            const priorOnMatchStarting = network.onMatchStarting;
            network.onMatchStarting = (payload, type) => {
                if (priorOnMatchStarting) priorOnMatchStarting(payload, type);
                lobbyScreen.style.display = 'none';
                game.startGameNetworked();
            };

            network.onKicked = () => {
                returnToNameScreen('You were removed from the room by the host/admin.');
            };

            game.onHostChanged = (hostSeatIndex, isHost) => {
                console.log(`[lobby] host is now seat ${hostSeatIndex}${isHost ? ' (you)' : ''}`);
                btnStartMatch.style.display = isHost ? 'inline-block' : 'none';
                waitingForHost.style.display = isHost ? 'none' : 'block';
                applySettingsToInputs(game.settings, isHost);
            };

            network.onClose = () => {
                if (!errorText.textContent) showError('Disconnected from server.');
            };
        }
    </script>
</body>
</html>
